  <style>
    .thank-you-card {
      text-align: center;
      padding: 3rem 2rem;
    }

<body>

<div class="scene">
  <!-- Efeitos de iluminação glow ao fundo -->
  <div class="glow glow-cyan"></div>
  <div class="glow glow-purple"></div>

  <main class="card thank-you-card">
    <div class="result-icon success" style="background: rgba(127, 0, 255, 0.1); border-color: var(--primary-purple); color: var(--primary-purple); box-shadow: 0 0 25px rgba(127, 0, 255, 0.3);">✔</div>
    
    <h2 style="font-family: var(--font-title); font-size: 1.85rem; margin-bottom: 1.5rem; letter-spacing: -0.5px;">
      Cadastro Recebido!
    </h2>
    
    <p class="sub" style="font-size: 1.25rem; line-height: 1.5; color: var(--text-white); margin-bottom: 2rem; font-weight: 500;">
      Obrigado, em breve seu perfil será analisado pelo nosso time e entraremos em contato.
    </p>
    
    <div class="result-badge" style="border-style: solid; border-color: rgba(255,255,255,0.08); color: var(--text-muted); background: rgba(255,255,255,0.01);">
      Análise de perfil em andamento
    </div>
  </main>

  <p class="footer-note">Alta Office Educação · Imersão Agente IA</p>
</div>
